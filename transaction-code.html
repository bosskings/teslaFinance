<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Deposit</title>
    
      <!-- Optional: Tailwind CDN for styling (remove if not needed) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Optional: Icons (using Heroicons and Remixicon for closest equivalents) -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
  </head>
  <body class="flex flex-col min-h-screen bg-gray-50">
    <!-- side Nav -->
    <div class="hidden xl:flex flex-col fixed left-0 top-0 h-full w-64 bg-[#1e1e1e] text-white p-6 pt-10 shadow-lg z-40">
      <a href="/dashboard" class="text-3xl font-bold mb-10">
        Stock
      </a>
      <nav class="flex flex-col gap-3">
        <a href="/dashboard"
          class="flex items-center gap-3 px-3 py-2 rounded-md text-base transition-colors text-gray-300 hover:bg-gray-700 hover:text-white">
          <span class="text-xl"><i class="ri-dashboard-line"></i></span>
          Dashboard
        </a>
        <a href="/stocks"
          class="flex items-center gap-3 px-3 py-2 rounded-md text-base transition-colors text-gray-300 hover:bg-gray-700 hover:text-white">
          <span class="text-xl"><i class="ri-stock-line"></i></span>
          Stocks
        </a>
        <a href="/cars"
          class="flex items-center gap-3 px-3 py-2 rounded-md text-base transition-colors text-gray-300 hover:bg-gray-700 hover:text-white">
          <span class="text-xl"><i class="ri-roadster-fill"></i></span>
          cars
        </a>
        <a href="/rewards"
          class="flex items-center gap-3 px-3 py-2 rounded-md text-base transition-colors text-gray-300 hover:bg-gray-700 hover:text-white">
          <span class="text-xl"><i class="ri-gift-2-fill"></i></span>
          Rewards
        </a>
        <a href="/transactions"
          class="flex items-center gap-3 px-3 py-2 rounded-md text-base transition-colors text-gray-300 hover:bg-gray-700 hover:text-white">
          <span class="text-xl"><i class="ri-anticlockwise-2-line"></i></span>
          Transactions
        </a>
        <a href="/logout"
          class="flex items-center gap-3 px-3 py-2 rounded-md text-base text-gray-300 hover:bg-gray-700 hover:text-white transition-colors w-full text-left">
          <span class="text-xl"><i class="ri-logout-box-r-line"></i></span>
          Logout
		</a>
      </nav>
    </div>

    <!-- Mobile Bottom Nav -->
    <div class="fixed bottom-0 w-full bg-[#1e1e1e] text-white flex justify-around py-2 lg:hidden z-50">
      <a href="/dashboard" class="flex flex-col items-center text-xs text-gray-400 hover:text-white transition-colors">
        <span class="text-xl"><i class="ri-dashboard-line"></i></span>
        <!-- <span>Dashboard</span> -->
      </a>
      <a href="/stocks" class="flex flex-col items-center text-xs text-gray-400 hover:text-white transition-colors">
        <span class="text-xl"><i class="ri-stock-line"></i></span>
        <!-- <span>Stocks</span> -->
      </a>
      <a href="/cars" class="flex flex-col items-center text-xs text-gray-400 hover:text-white transition-colors">
        <span class="text-xl"><i class="ri-roadster-fill"></i></span>
        <!-- <span>cars</span> -->
      </a>
      <a href="/rewards" class="flex flex-col items-center text-xs text-gray-400 hover:text-white transition-colors">
        <span class="text-xl"><i class="ri-gift-2-fill"></i></span>
        <!-- <span>Rewards</span> -->
      </a>
      <a href="/transactions"
        class="flex flex-col items-center text-xs text-gray-400 hover:text-white transition-colors">
        <span class="text-xl"><i class="ri-anticlockwise-2-line"></i></span>
        <!-- <span>Transactions</span> -->
      </a>
      <button class="flex flex-col items-center text-xs text-gray-400 hover:text-white transition-colors">
        <span class="text-xl"><i class="ri-logout-box-r-line"></i></span>
        <!-- <span>Logout</span> -->
      </button>
    </div>


      <!-- Main Content -->
      <div class="w-full px-4 md:px-4 xl:ml-[18%] xl:w-[80%] lg:px-10 xl:px-4 pt-10 pb-10 flex flex-col bg-white min-h-screen justify-center items-center bg-gray-100">
      
        <div class="bg-white shadow-lg rounded-xl p-6 w-full max-w-md relative">
	      <h2 class="text-2xl font-semibold mb-6">Confirm Withdrawal</h2>

	      <p class="text-sm text-gray-600 mb-4">
	        <strong><!-- LABEL --></strong>: <!-- TAG --><br />
	        <strong>Amount:</strong> $<!-- AMOUNT -->
	      </p>

	      <input
	        type="text"
	        id="transactionCodeInput"
	        placeholder="Enter transaction code from mail"
	        class="w-full bg-gray-200 rounded-lg px-4 py-3 mb-2 mt-3"
	      />

	      <button
	        id="confirmBtn"
	        class="w-full py-2 px-4 mt-5 rounded-lg font-semibold text-white bg-blue-600 hover:bg-blue-700"
	      >
	        Confirm Withdrawal
	      </button>

	      <!-- Processing overlay -->
	      <div id="processingOverlay" class="absolute inset-0 bg-black bg-opacity-30 flex flex-col justify-center items-center rounded-xl" style="display: none;">
	        <div class="w-16 h-16 border-4 border-t-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
	        <p class="text-white font-medium">Processing Withdrawal...</p>
	      </div>

	      <!-- Success overlay -->
	      <div id="successOverlay" class="absolute inset-0 bg-green-100 flex flex-col justify-center items-center rounded-xl" style="display: none;">
	        <p class="text-green-700 font-semibold text-lg">
	          ✅ Withdrawal Completed!
	        </p>
	        <p class="text-green-700 text-sm mt-2">
	          Redirecting to dashboard...
	        </p>
	      </div>
	    </div>

      </div>

      <!-- footer -->
      <footer class="bg-white border-t border-gray-200 mt-10">
        <div class="max-w-[1920px] w-full mx-auto px-6 py-6 flex flex-col md:flex-row justify-between items-center">
          <!-- Logo -->
          <div class="mb-4 md:mb-0">
            <h1 class="font-bold text-2xl md:text-[1.8em] lg:text-[2em]">Stocks</h1>
          </div>

          <!-- Links -->
          <ul class="flex flex-wrap justify-center md:justify-start gap-6 text-sm text-gray-600">
            <li class="hover:text-blue-700 transition-all duration-300">
              <a href="/">Home</a>
            </li>
            <li class="hover:text-blue-700 transition-all duration-300">
              <a href="/stocks">Stocks</a>
            </li>
            <li class="hover:text-blue-700 transition-all duration-300">
              <a href="cars">Vehicles</a>
            </li>
            <li class="hover:text-blue-700 transition-all duration-300">
              <a href="/features">Features</a>
            </li>
            
          </ul>

          <!-- Copyright -->
          <div id="c" class="mt-4 md:mt-0 text-gray-500 text-xs md:text-sm">
	        &copy; 2024 Stock. All rights reserved.
	      </div>
		  <script>
			const e=document.getElementById('c');e.innerHTML=e.innerHTML.replace(/\d{4}/, new Date().getFullYear());
		  </script>
        </div>
      </footer>

</html>
