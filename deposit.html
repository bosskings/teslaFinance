      <script>
        // Plain JavaScript for interaction
        const digital = document.getElementById('digital-wallet');
        const crypto = document.getElementById('crypto-wallet');
        const bank = document.getElementById('bank-transfer');
        const proceedBtn = document.getElementById('proceed-btn');

        function resetSelects(except) {
          if (except !== digital) digital.selectedIndex = 0;
          if (except !== crypto) crypto.selectedIndex = 0;
          if (except !== bank) bank.selectedIndex = 0;
        }

        function updateButtonAndDisableSelects(selectedVal, group) {
          // If a selection is made, enable button and disable others
          if (selectedVal) {
            proceedBtn.disabled = false;
            proceedBtn.classList.remove('bg-gray-400', 'cursor-not-allowed');
            proceedBtn.classList.add('bg-blue-600');
            if (group === 'digital') {
              crypto.disabled = true;
              bank.disabled = true;
            } else if (group === 'crypto') {
              digital.disabled = true;
              bank.disabled = true;
            } else if (group === 'bank') {
              digital.disabled = true;
              crypto.disabled = true;
            }
          } else {
            proceedBtn.disabled = true;
            proceedBtn.classList.add('bg-gray-400', 'cursor-not-allowed');
            proceedBtn.classList.remove('bg-blue-600');
            digital.disabled = false;
            crypto.disabled = false;
            bank.disabled = false;
          }
        }

        let selectedMethod = "";

        digital.addEventListener('change', function() {
          selectedMethod = this.value;
          resetSelects(digital);
          updateButtonAndDisableSelects(this.value, 'digital');
        });

        crypto.addEventListener('change', function() {
          selectedMethod = this.value;
          resetSelects(crypto);
          updateButtonAndDisableSelects(this.value, 'crypto');
        });

        bank.addEventListener('change', function() {
          selectedMethod = this.value;
          resetSelects(bank);
          updateButtonAndDisableSelects(this.value, 'bank');
        });

        proceedBtn.addEventListener('click', function() {
          if (!selectedMethod) return;
          // In a plain HTML setting, we'll just redirect to a URL
          window.location.href = `/proceed-deposit?method=${encodeURIComponent(selectedMethod)}`;
        });
      </script>
